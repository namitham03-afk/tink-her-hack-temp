document.getElementById("selectLangBtn").onclick=function(){
  let lang=document.getElementById("initialLanguageSelect").value;
  if(!lang) return alert("Please select a language");
  userData.language=lang;
  let t=formTexts[lang];

  document.getElementById("languageSelectContainer").style.display="none";
  document.getElementById("priorityFormContainer").style.display="block";

  document.getElementById("formTitle").textContent=t.title;
  document.getElementById("nameField").placeholder=t.name;
  document.getElementById("ageField").placeholder=t.age;
  document.getElementById("startChatBtn").textContent=t.button;

  // Populate Gender
  let g=document.getElementById("genderField"); g.innerHTML="";
  let go=document.createElement("option"); go.text=t.gender; go.value=""; g.add(go);
  t.genders.forEach(v=>{let o=document.createElement("option"); o.text=v; o.value=v; g.add(o);});

  // Populate Special
  let s=document.getElementById("specialField"); s.innerHTML="";
  let so=document.createElement("option"); so.text=t.special; so.value=""; s.add(so);
  t.specials.forEach(v=>{let o=document.createElement("option"); o.text=v; o.value=v; s.add(o);});

  // Populate Education
  let e=document.getElementById("educationField"); e.innerHTML="";
  let eo=document.createElement("option"); eo.text=t.education; eo.value=""; e.add(eo);
  t.educations.forEach(v=>{let o=document.createElement("option"); o.text=v; o.value=v; e.add(o);});

  // Populate Employment
  let emp=document.getElementById("employmentField"); emp.innerHTML="";
  let empo=document.createElement("option"); empo.text=t.employment; empo.value=""; emp.add(empo);
  t.employments.forEach(v=>{let o=document.createElement("option"); o.text=v; o.value=v; emp.add(o);});

  // Populate Service
  let sv=document.getElementById("serviceField"); sv.innerHTML="";
  let svo=document.createElement("option"); svo.text=t.service; svo.value=""; sv.add(svo);
  t.services.forEach(v=>{let o=document.createElement("option"); o.text=v; o.value=v; sv.add(o);});
};

function addMsg(type,text){
  let d=document.createElement("div");
  d.className="message "+type;
  d.textContent=text;
  document.getElementById("chatbox").appendChild(d);
  document.getElementById("chatbox").scrollTop=document.getElementById("chatbox").scrollHeight;
}

// Send button
document.getElementById("sendBtn").onclick=function(){
  let input=document.getElementById("userInput");
  if(!input.value.trim()) return;
  addMsg("user",input.value);
  
  setTimeout(()=>{
    let reply = getServiceReply(userData.service, userData.language);
    addMsg("bot", reply);
  },500);
  input.value="";
};

// Enter key
document.getElementById("userInput").addEventListener("keypress", function(e){
  if(e.key==="Enter") document.getElementById("sendBtn").click();
});

  document.getElementById("languageSelectContainer").style.display="none";
  document.getElementById("priorityFormContainer").style.display="block";

  document.getElementById("formTitle").textContent=t.title;
  document.getElementById("nameField").placeholder=t.name;
  document.getElementById("ageField").placeholder=t.age;
  document.getElementById("startChatBtn").textContent=t.button;

  // Populate Gender
  let g=document.getElementById("genderField"); g.innerHTML="";
  let go=document.createElement("option"); go.text=t.gender; go.value=""; g.add(go);

};

// --- Chat Functions ---
function addMsg(type,text){
  let d=document.createElement("div");
  d.className="message "+type;
  d.textContent=text;
  document.getElementById("chatbox").appendChild(d);
  document.getElementById("chatbox").scrollTop=document.getElementById("chatbox").scrollHeight;
}

// Send button
document.getElementById("sendBtn").onclick=function(){
  let input=document.getElementById("userInput");
  if(!input.value.trim()) return;
  addMsg("user",input.value);
  
  setTimeout(()=>{
    let reply = getServiceReply(userData.service, userData.language);
    addMsg("bot", reply);
  },500);
  input.value="";
};

// Enter key
document.getElementById("userInput").addEventListener("keypress", function(e){
  if(e.key==="Enter") document.getElementById("sendBtn").click();
});
</script>
